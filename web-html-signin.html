<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Oussama Boussaidi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="web-sign-in-css.css">
</head>
<body>

  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- Background orbs -->
  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- Back button -->
  <a href="web-html (2).html" class="back-btn" aria-label="Back to home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back
  </a>

  <!-- Main card -->
  <div class="card-wrap">
    <div class="login-card">

      <!-- Left panel — branding -->
      <div class="card-left">
        <div class="brand">OB<span class="dot">.</span></div>
        <div class="brand-tagline">
          <h2>Welcome back</h2>
          <p>Sign in to access your account and explore all content.</p>
        </div>
        <div class="brand-deco">
          <div class="deco-ring"></div>
          <div class="deco-ring deco-ring-2"></div>
          <div class="deco-center">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>
        <div class="card-left-footer">
          <span>New here?</span>
          <a href="web-html.html" class="link-accent">Explore my work ↗</a>
        </div>
      </div>

      <!-- Right panel — form -->
      <div class="card-right">
        <div class="form-header">
          <h1 class="form-title">Member Login</h1>
          <p class="form-sub">Enter your credentials to continue</p>
        </div>

        <div class="form-body">
          <!-- Email -->
          <div class="field">
            <label class="field-label" for="email">Email or Username</label>
            <div class="field-input-wrap">
              <div class="field-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </div>
              <input
                id="email"
                type="text"
                class="field-input"
                placeholder="you@example.com"
                autocomplete="username"
              >
            </div>
          </div>

          <!-- Password -->
          <div class="field">
            <div class="field-label-row">
              <label class="field-label" for="password">Password</label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <div class="field-input-wrap">
              <div class="field-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <input
                id="password"
                type="password"
                class="field-input"
                placeholder="••••••••"
                autocomplete="current-password"
              >
              <button class="toggle-pw" id="togglePw" aria-label="Toggle password" onclick="togglePassword()">
                <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <!-- Remember -->
          <label class="remember-row">
            <input type="checkbox" id="remember" class="checkbox">
            <span class="checkmark"></span>
            <span class="remember-label">Keep me signed in</span>
          </label>

          <!-- Submit -->
          <button class="submit-btn" onclick="handleLogin()">
            <span id="btnText">Log In</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>

          <!-- Divider -->
          <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-text">or continue with</span>
            <span class="divider-line"></span>
          </div>

          <!-- Social buttons -->
          <div class="socials-row">
            <button class="social-login-btn" aria-label="Continue with Google">
              <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Google
            </button>
            <button class="social-login-btn" aria-label="Continue with GitHub">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
              GitHub
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // Cursor glow
    const glow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', e => {
      glow.style.left = e.clientX + 'px';
      glow.style.top  = e.clientY + 'px';
    });

    // Password toggle
    function togglePassword() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      const isText = pw.type === 'text';
      pw.type = isText ? 'password' : 'text';
      icon.innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }

    // Login handler with loading state
    function handleLogin() {
      const btn = document.querySelector('.submit-btn');
      const txt = document.getElementById('btnText');
      btn.disabled = true;
      btn.style.opacity = '0.7';
      txt.textContent = 'Signing in…';
      setTimeout(() => {
        btn.disabled = false;
        btn.style.opacity = '';
        txt.textContent = 'Log In';
      }, 2000);
    }

    // Entrance animation
    document.querySelector('.card-wrap').style.opacity = '0';
    document.querySelector('.card-wrap').style.transform = 'translateY(20px)';
    requestAnimationFrame(() => {
      document.querySelector('.card-wrap').style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      document.querySelector('.card-wrap').style.opacity = '1';
      document.querySelector('.card-wrap').style.transform = 'none';
    });
  </script>
</body>
</html>
