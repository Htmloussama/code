<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Oussama Boussaidi</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23060c10'/><text x='50' y='68' font-family='Arial Black,sans-serif' font-size='52' font-weight='900' fill='%2300d4ff' text-anchor='middle'>OB</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="web-sign-in-css.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>

  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-overlay"></div>
  </div>

  <a href="index.html" class="back-btn" aria-label="Back to home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back
  </a>

  <div class="card-wrap">
    <div class="login-card">

      <!-- Left panel -->
      <div class="card-left">
        <div class="brand">OB<span class="dot">.</span></div>
        <div class="brand-tagline">
          <h2>Join us</h2>
          <p>Create your account and get access to all content and downloads.</p>
        </div>
        <div class="brand-deco">
          <div class="deco-ring"></div>
          <div class="deco-ring deco-ring-2"></div>
          <div class="deco-center">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
        </div>
        <div class="card-left-footer">
          <span>Already have an account?</span>
          <a href="web-html-signin.html" class="link-accent">Log In ↗</a>
        </div>
      </div>

      <!-- Right panel — form -->
      <div class="card-right">
        <div class="form-header">
          <h1 class="form-title">Create Account</h1>
          <p class="form-sub">Fill in your details to get started</p>
        </div>

        <!-- Error / success message -->
        <div id="formMsg" style="display:none;padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:8px;"></div>

        <div class="form-body">

          <!-- Username -->
          <div class="field">
            <label class="field-label" for="username">Username</label>
            <div class="field-input-wrap">
              <div class="field-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <input id="username" type="text" class="field-input" placeholder="yourname" autocomplete="username">
            </div>
          </div>

          <!-- Email -->
          <div class="field">
            <label class="field-label" for="email">Email</label>
            <div class="field-input-wrap">
              <div class="field-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </div>
              <input id="email" type="email" class="field-input" placeholder="you@example.com" autocomplete="email">
            </div>
          </div>

          <!-- Password -->
          <div class="field">
            <label class="field-label" for="password">Password</label>
            <div class="field-input-wrap">
              <div class="field-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <input id="password" type="password" class="field-input" placeholder="Min. 6 characters" autocomplete="new-password">
              <button class="toggle-pw" aria-label="Toggle password" onclick="togglePassword('password', 'eye1')">
                <svg id="eye1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="field">
            <label class="field-label" for="confirm">Confirm Password</label>
            <div class="field-input-wrap">
              <div class="field-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <input id="confirm" type="password" class="field-input" placeholder="Repeat password" autocomplete="new-password">
              <button class="toggle-pw" aria-label="Toggle password" onclick="togglePassword('confirm', 'eye2')">
                <svg id="eye2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button class="submit-btn" onclick="handleRegister()">
            <span id="btnText">Create Account</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>

          <!-- Divider -->
          <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-text">already have an account?</span>
            <span class="divider-line"></span>
          </div>

          <a href="web-html-signin.html" class="submit-btn" style="background:transparent;border:1px solid rgba(0,212,255,0.25);color:var(--cyan);box-shadow:none;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:10px;">
            Log In Instead
          </a>

        </div>
      </div>
    </div>
  </div>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCPC9SYd2M-OXTejoOKCfunOnaifixwbgg",
      authDomain: "oussama-portfolio-c391e.firebaseapp.com",
      projectId: "oussama-portfolio-c391e",
      storageBucket: "oussama-portfolio-c391e.firebasestorage.app",
      messagingSenderId: "516744473155",
      appId: "1:516744473155:web:45df424fe07fcd918bc2f6"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Show message helper
    function showMsg(text, isError) {
      const el = document.getElementById('formMsg');
      el.style.display = 'block';
      el.style.background = isError ? 'rgba(255,80,80,0.1)' : 'rgba(0,229,160,0.1)';
      el.style.border = isError ? '1px solid rgba(255,80,80,0.3)' : '1px solid rgba(0,229,160,0.3)';
      el.style.color = isError ? '#ff6b6b' : '#00e5a0';
      el.textContent = text;
    }

    // Register function
    function handleRegister() {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const btn      = document.querySelector('.submit-btn');
      const txt      = document.getElementById('btnText');

      // Validation
      if (!username || !email || !password || !confirm) {
        showMsg('Please fill in all fields.', true); return;
      }
      if (username.length < 3) {
        showMsg('Username must be at least 3 characters.', true); return;
      }
      if (password.length < 6) {
        showMsg('Password must be at least 6 characters.', true); return;
      }
      if (password !== confirm) {
        showMsg('Passwords do not match.', true); return;
      }

      btn.disabled = true;
      btn.style.opacity = '0.7';
      txt.textContent = 'Creating account…';

      // Create user in Firebase
      auth.createUserWithEmailAndPassword(email, password)
        .then(result => {
          // Save username to Firebase profile
          return result.user.updateProfile({ displayName: username });
        })
        .then(() => {
          showMsg('Account created! Redirecting…', false);
          setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        })
        .catch(err => {
          btn.disabled = false;
          btn.style.opacity = '';
          txt.textContent = 'Create Account';
          // Friendly error messages
          const msgs = {
            'auth/email-already-in-use': 'This email is already registered. Try logging in.',
            'auth/invalid-email': 'Please enter a valid email address.',
            'auth/weak-password': 'Password is too weak. Use at least 6 characters.'
          };
          showMsg(msgs[err.code] || err.message, true);
        });
    }

    // Password toggle
    function togglePassword(fieldId, iconId) {
      const pw   = document.getElementById(fieldId);
      const icon = document.getElementById(iconId);
      const isText = pw.type === 'text';
      pw.type = isText ? 'password' : 'text';
      icon.innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }

    // Cursor glow
    const glow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', e => {
      glow.style.left = e.clientX + 'px';
      glow.style.top  = e.clientY + 'px';
    });

    // Entrance animation
    const card = document.querySelector('.card-wrap');
    card.style.opacity = '0';
    card.style.transform = 'translateY(20px)';
    requestAnimationFrame(() => {
      card.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      card.style.opacity = '1';
      card.style.transform = 'none';
    });
  </script>
</body>
</html>
